  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ackground:#fff;border:1px solid #e2e7f0;border-radius:12px;padding:14px 18px;margin-bottom:24px\">\n                  <span style=\"font-size:13px;font-weight:600;color:#5b6478\">De<\u002Fspan>\n                  <input type=\"date\" value=\"{{ customStart }}\" onchange=\"{{ setCustomStart }}\" style=\"font-family:inherit;font-size:13.5px;color:#1a1f36;border:1px solid #d6deec;border-radius:7px;padding:7px 10px\">\n                  <span style=\"font-size:13px;font-weight:600;color:#5b6478\">até<\u002Fspan>\n                  <input type=\"date\" value=\"{{ customEnd }}\" onchange=\"{{ setCustomEnd }}\" style=\"font-family:inherit;font-size:13.5px;color:#1a1f36;border:1px solid #d6deec;border-radius:7px;padding:7px 10px\">\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- KPIs -->\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px\">\n                <div style=\"background:#fff;border:1px solid #e2e7f0;border-top:3px solid #1a3a8f;border-radius:12px;padding:18px 20px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#7a8299;text-transform:uppercase;letter-spacing:.04em\">Protocolos feitos<\u002Fdiv>\n                  <div style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#1a1f36;margin-top:8px\">{{ kFeitos }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1b4;margin-top:4px;line-height:1.4\">abertos no período<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e2e7f0;border-top:3px solid #1f9d57;border-radius:12px;padding:18px 20px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#7a8299;text-transform:uppercase;letter-spacing:.04em\">Concluídos<\u002Fdiv>\n                  <div style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#1a1f36;margin-top:8px\">{{ kConcluidos }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1b4;margin-top:4px;line-height:1.4\">por data de conclusão<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e2e7f0;border-top:3px solid #f5a623;border-radius:12px;padding:18px 20px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#7a8299;text-transform:uppercase;letter-spacing:.04em\">Ainda abertos<\u002Fdiv>\n                  <div style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#1a1f36;margin-top:8px\">{{ kAbertos }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1b4;margin-top:4px;line-height:1.4\">do período, sem conclusão<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e2e7f0;border-top:3px solid #1a3a8f;border-radius:12px;padding:18px 20px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#7a8299;text-transform:uppercase;letter-spacing:.04em\">Taxa de resolução<\u002Fdiv>\n                  <div style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#1a1f36;margin-top:8px\">{{ kTaxa }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1b4;margin-top:4px;line-height:1.4\">do que foi aberto no período<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e2e7f0;border-top:3px solid #1f9d57;border-radius:12px;padding:18px 20px\">\n                  <div style=\"font-size:12px;font-weight:600;color:#7a8299;text-transform:uppercase;letter-spacing:.04em\">Tempo médio<\u002Fdiv>\n                  <div style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#1a1f36;margin-top:8px\">{{ kTempo }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#9aa1b4;margin-top:4px;line-height:1.4\">dias, dos concluídos<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e2 y:flex;flex-wrap:wrap;gap:6px;margin:14px 0 2px\">\n                      <sc-for list=\"{{ tempoMetricTabs }}\" as=\"m\" hint-placeholder-count=\"4\">\n                        <button onclick=\"{{ m.click }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:7px 14px;margin:14px 0 4px\">\n                      <sc-for list=\"{{ tempoLegend }}\" as=\"lg\" hint-placeholder-count=\"10\">\n                        <button onclick=\"{{ lg.click }}\" style=\"{{ lg.style }}\"><span style=\"{{ lg.dot }}\"><\u002Fspan>{{ lg.name }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:8px\">{{ tempoChartEl }}<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- legenda de cores das métricas -->\n                  <div style=\"display:flex;gap:18px;flex-wrap:wrap;margin:16px 0 4px\">\n                    <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#1a1f36\"><span style=\"width:11px;height:11px;border-radius:3px;background:#1a3a8f\"><\u002Fspan>Registrados<\u002Fspan>\n                    <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#1a1f36\"><span style=\"width:11px;height:11px;border-radius:3px;background:#e08a1e\"><\u002Fspan>Em aberto<\u002Fspan>\n                    <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#1a1f36\"><span style=\"width:11px;height:11px;border-radius:3px;background:#1f9d57\"><\u002Fspan>Concluídos<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:18px\">\n                    <sc-for list=\"{{ dimBars }}\" as=\"item\" hint-placeholder-count=\"10\">\n                      <div>\n weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">JAN / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Janeiro<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n            <a href=\"rel_0226.pdf\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border:1px solid #1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">FEV / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Fevereiro<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n            <a href=\"rel_0326.pdf\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border:1px solid #1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">MAR / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Março<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n            <a href=\"rel_0426.pdf\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border:1px solid #1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">ABR / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Abril<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n            <a href=\"rel_0526.pdf\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border:1px solid #1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">MAI / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Maio<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n            <a href=\"rel_0626.pdf\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border:1px solid #1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">JUN / 26<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><rect x=\"4\" y=\"2\" width=\"14\" height=\"18\" rx=\"2\" fill=\"none\" stroke=\"#c2cadb\" stroke-width=\"1.5\"><\u002Frect><path d=\"M7 11 11 15 15 9\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px\">Junho<\u002Fdiv><div style=\"font-size:12px;color:#9aa1b4;margin-top:2px\">Relatório mensal · PDF<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:14px\">Baixar PDF ↓<\u002Fdiv><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======== LEIS ======== -->\n    <sc-if value=\"{{ isLeis }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"background:#1a3a8f;padding:48px 32px 40px;text-align:center\">\n          <h1 style=\"font-family:'Libre Franklin';font-size:30px;font-weight:800;color:#fff;letter-spacing:-.01em\">Legislação da Ouvidoria<\u002Fh1>\n          <p style=\"font-size:15px;color:#dbe3fa;margin-top:8px\">Base legal que garante e regula o direito de manifestação do cidadão<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"max-width:920px;margin:0 auto;padding:48px 32px 64px;width:100%\">\n\n          <!-- Grupo 1 -->\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid #1a3a8f;padding-bottom:10px;margin-bottom:24px\">\n            <span style=\"font-family:'Libre Franklin';font-size:20px;font-weight:800;color:#1a1f36\">Normas municipais<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:44px\">\n            <a href=\"https://leismunicipais.com.br/a/sp/i/itupeva/lei-ordinaria/2012/190/1896/lei-ordinaria-n-1896-2012-cria-a-ouvidoria-publica-municipal-de-itupeva-e-da-outras-providencias\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-left:4px solid #1a3a8f;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border-color:#1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">LEI Nº 1.896/2012<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><path d=\"M6 4 16 4 16 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 4 6 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px;line-height:1.3\">Cria a Ouvidoria Pública Municipal de Itupeva<\u002Fdiv><div style=\"font-size:13px;color:#5b6478;margin-top:8px;line-height:1.5\">Institui a Ouvidoria Municipal, define sua estrutura, competências e o direito do cidadão de apresentar manifestações ao poder público.<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:16px\">Acessar lei ↗<\u002Fdiv><\u002Fa>\n          <\u002Fdiv>\n\n          <!-- Grupo 2 -->\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid #1a3a8f;padding-bottom:10px;margin-bottom:24px\">\n            <span style=\"font-family:'Libre Franklin';font-size:20px;font-weight:800;color:#1a1f36\">Normas federais<\u002Fspan>\n            <span style=\"font-size:13px;color:#7a8299;font-weight:600\">3 leis<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n            <a href=\"https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2011/lei/l12527.htm\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-left:4px solid #1a3a8f;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border-color:#1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">LEI Nº 12.527/2011<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><path d=\"M6 4 16 4 16 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 4 6 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px;line-height:1.3\">Lei de Acesso à Informação (LAI)<\u002Fdiv><div style=\"font-size:13px;color:#5b6478;margin-top:8px;line-height:1.5\">Garante a qualquer pessoa o direito de solicitar e receber informações públicas, com prazos definidos de resposta.<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:16px\">Acessar lei ↗<\u002Fdiv><\u002Fa>\n            <a href=\"https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2017/lei/l13460.htm\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-left:4px solid #1a3a8f;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border-color:#1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">LEI Nº 13.460/2017<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><path d=\"M6 4 16 4 16 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 4 6 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px;line-height:1.3\">Código de Defesa do Usuário do Serviço Público<\u002Fdiv><div style=\"font-size:13px;color:#5b6478;margin-top:8px;line-height:1.5\">Define os direitos do usuário dos serviços públicos e estabelece o papel e o funcionamento das ouvidorias.<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:16px\">Acessar lei ↗<\u002Fdiv><\u002Fa>\n            <a href=\"https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm\" target=\"_blank\" style=\"border:1px solid #e2e7f0;border-left:4px solid #1a3a8f;border-radius:12px;padding:20px;text-decoration:none;display:block;background:#fff\" style-hover=\"border-color:#1a3a8f\"><div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"background:#eef2fb;color:#1a3a8f;font-size:11px;font-weight:800;letter-spacing:.05em;padding:4px 10px;border-radius:20px\">LEI Nº 13.709/2018<\u002Fspan><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\"><path d=\"M6 4 16 4 16 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M16 4 6 14\" fill=\"none\" stroke=\"#1a3a8f\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-family:'Libre Franklin';font-size:17px;font-weight:700;color:#1a1f36;margin-top:16px;line-height:1.3\">Lei Geral de Proteção de Dados (LGPD)<\u002Fdiv><div style=\"font-size:13px;color:#5b6478;margin-top:8px;line-height:1.5\">Protege os dados pessoais de quem registra manifestações, assegurando sigilo e tratamento adequado das informações.<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#1a3a8f;margin-top:16px\">Acessar lei ↗<\u002Fdiv><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0d1f5a;padding:40px 32px 24px\">\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:32px;max-width:1000px;margin:0 auto\">\n      <div>\n        \n        \n      <\u002Fdiv>\n      <div>\n        \n        \n      <\u002Fdiv>\n      <div>\n        \n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,.1);margin-top:28px;padding-top:18px;text-align:center;font-size:12px;color:#7e8fc4;max-width:1000px;margin-left:auto;margin-right:auto\">Prefeitura Municipal de Itupeva · Estado de São Paulo<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst CAT_COLORS = ['#1a3a8f','#e08a1e','#b0413e','#1f9d57','#5566b5','#1a8a8f','#8a6d3b','#8a8f9e'];\nconst MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];\nconst MESES_ABR = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];\n\nclass Component extends DCLogic {\n  state = {\n    page: 'inicio',\n    data: null, loading: true, error: false,\n    gran: 'mes', anchor: null,\n    customStart: '', customEnd: '',\n    chartDim: 'sec', dimMetric: 'reg', lineMetric: 'dias', offMap: {}, tempoPick: {},\n    botTab: 'secretaria',\n    hoverIdx: null, catHoverIdx: null, tempoHoverIdx: null,\n  };\n\n  componentDidMount() {\n    // 1) dados embutidos no próprio HTML (funciona offline / file://)\n    try {\n      const tag = document.getElementById('metricas-embed');\n      if (tag && tag.textContent && tag.textContent.trim().length > 2) {\n        const data = JSON.parse(tag.textContent);\n        this.applyData(data);\n        return;\n      }\n    } catch (e) { /* cai no fetch */ }\n    // 2) arquivo externo dados/metricas.json (versão hospedada)\n    fetch('dados/metricas.json')\n      .then(r => { if (!r.ok) throw new Error('http'); return r.json(); })\n      .then(data => this.applyData(data))\n      .catch(() => this.setState({ loading: false, error: true }));\n  }\n\n  applyData(data) {\n    const fim = data.meta.janela_fim;\n    this.setState({\n      data, loading: false, error: false,\n      anchor: fim,\n      customStart: this.addDays(this.parse(fim), -29),\n      customEnd: fim,\n    });\n  }\n\n  // ---- date helpers (UTC) ----\n  parse(s){ const [y,m,d]=s.split('-').map(Number); return new Date(Date.UTC(y,m-1,d)); }\n  iso(d){ const p=n=>String(n).padStart(2,'0'); return d.getUTCFullYear()+'-'+p(d.getUTCMonth()+1)+'-'+p(d.getUTCDate()); }\n  addDays(d,n){ const x=new Date(d.getTime()); x.setUTCDate(x.getUTCDate()+n); return this.iso(x); }\n  clampISO(s){ const d=this.state.data; if(!d) return s; if(s<d.meta.janela_inicio) return d.meta.janela_inicio; if(s>d.meta.janela_fim) return d.meta.janela_fim; return s; }\n\n  // ---- selected period [A,B] as ISO strings ----\n  bounds(){\n    const g=this.state.gran;\n    if(g==='custom'){\n      let a=this.state.customStart, b=this.state.customEnd;\n      if(a>b){ const t=a;a=b;b=t; }\n      return [a,b];\n    }\n    const a=this.parse(this.state.anchor);\n    if(g==='dia') return [this.iso(a), this.iso(a)];\n    if(g==='semana'){ const dow=(a.getUTCDay()+6)%7; const A=this.addDays(a,-dow); return [A, this.addDays(this.parse(A),6)]; }\n    if(g==='mes'){ const A=new Date(Date.UTC(a.getUTCFullYear(),a.getUTCMonth(),1)); const B=new Date(Date.UTC(a.getUTCFullYear(),a.getUTCMonth()+1,0)); return [this.iso(A),this.iso(B)]; }\n    if(g==='ano') return [a.getUTCFullYear()+'-01-01', a.getUTCFullYear()+'-12-31'];\n  }\n\n  shift(dir){\n    const g=this.state.gran; const a=this.parse(this.state.anchor);\n    let next;\n    if(g==='dia') next=this.addDays(a,dir);\n    else if(g==='semana') next=this.addDays(a,dir*7);\n    else if(g==='mes'){ next=this.iso(new Date(Date.UTC(a.getUTCFullYear(),a.getUTCMonth()+dir,1))); }\n    else if(g==='ano'){ next=this.iso(new Date(Date.UTC(a.getUTCFullYear()+dir,a.getUTCMonth(),1))); }\n    this.setState({ anchor: this.clampISO(next), hoverIdx:null });\n  }\n\n  setGran(g){\n    const st={ gran:g, hoverIdx:null };\n    if(g==='custom' && this.state.data){\n      st.customEnd=this.state.data.meta.janela_fim;\n      st.customStart=this.addDays(this.parse(st.customEnd),-29);\n    }\n    this.setState(st);\n  }\n\n  // ---- aggregate diary over [A,B] ----\n  sumRange(A,B){\n    const diario=this.state.data.diario;\n    const acc={f:0,fab:0,fcc:0,fcn:0,c:0,cd:0,cn:0,cat:[0,0,0,0,0,0,0,0]};\n    let cur=this.parse(A); const end=this.parse(B);\n    while(cur.getTime()<=end.getTime()){\n      const day=diario[this.iso(cur)];\n      if(day){ acc.f+=day.f;acc.fab+=day.fab;acc.fcc+=day.fcc;acc.fcn+=day.fcn;acc.c+=day.c;acc.cd+=day.cd;acc.cn+=day.cn; for(let i=0;i<8;i++) acc.cat[i]+=day.cat[i]; }\n      cur.setUTCDate(cur.getUTCDate()+1);\n    }\n    return acc;\n  }\n\n  // ---- chart bucket ranges (trailing window by granularity) ----\n  bucketRanges(){\n    const g=this.state.gran; const [A,B]=this.bounds();\n    const out=[];\n    const lblD=k=>{ const d=this.parse(k); return String(d.getUTCDate()).padStart(2,'0')+'/'+MESES_ABR[d.getUTCMonth()]; };\n    if(g==='dia'){\n      const endD=this.parse(B);\n      for(let i=29;i>=0;i--){ const k=this.addDays(endD,-i); out.push({label:lblD(k),a:k,b:k}); }\n    } else if(g==='semana'){\n      const b=this.parse(B); const dow=(b.getUTCDay()+6)%7; const wEnd=this.addDays(b,-dow);\n      for(let i=11;i>=0;i--){ const ws=this.addDays(this.parse(wEnd),-7*i); const we=this.addDays(this.parse(ws),6); out.push({label:lblD(ws),a:ws,b:we}); }\n    } else if(g==='mes'){\n      const b=this.parse(B);\n      for(let i=11;i>=0;i--){ const ms=new Date(Date.UTC(b.getUTCFullYear(),b.getUTCMonth()-i,1)); const me=new Date(Date.UTC(ms.getUTCFullYear(),ms.getUTCMonth()+1,0)); out.push({label:MESES_ABR[ms.getUTCMonth()]+'/'+String(ms.getUTCFullYear()).slice(2),a:this.iso(ms),b:this.iso(me)}); }\n    } else if(g==='ano'){\n      const y0=this.parse(this.state.data.meta.janela_inicio).getUTCFullYear();\n      const y1=this.parse(B).getUTCFullYear();\n      for(let y=y0;y<=y1;y++){ out.push({label:String(y),a:y+'-01-01',b:y+'-12-31'}); }\n    } else { // custom\n      const spanDays=Math.round( ic per month → multiline series\n  // metric: 'dias' (tempo médio) | 'reg' | 'ab' | 'cc'\n  tempoSeriesFor(dim, metric){\n    metric=metric||'dias';\n    const meta=this.state.data.meta;\n    const map={sec:'secretarias',bai:'bairros',ass:'assuntos'};\n    const names=meta[map[dim]]||[];\n    const md=this.state.data.mensal_dim||{};\n    const months=Object.keys(md).sort();\n    const reg=names.map(()=>0);\n    months.forEach(mk=>{ const cell=md[mk]&&md[mk][dim]; if(!cell) return; const r=Array.isArray(cell)?cell:(cell.reg||[]); for(let i=0;i<names.length;i++) reg[i]+=r[i]||0; });\n    const order=names.map((_,i)=>i).sort((a,b)=>reg[b]-reg[a]).slice(0,10);\n    const PALETTE=['#1a3a8f','#e08a1e','#1f9d57','#b0413e','#5566b5','#1a8a8f','#8a6d3b','#c2477e','#3d8a3d','#6b3fb0'];\n    const buckets=months.map(mk=>{\n      const cell=md[mk]&&md[mk][dim];\n      let arr=[];\n      if(cell){ if(Array.isArray(cell)){ arr=metric==='reg'?cell:[]; } else { arr=cell[metric]||[]; } }\n      const [y,m]=mk.split('-');\n      return {label:MESES_ABR[Number(m)-1]+'/'+y.slice(2), vals:order.map(i=>{ const v=arr[i]; if(metric==='dias') return (v&&v>0)?v:null; return v||0; })};\n    });\n    return {buckets, names:order.map(i=>names[i]), colors:order.map((_,k)=>PALETTE[k%PALETTE.length])};\n  }\n\n  // multiline time chart, handles gaps + hover tooltip; unit appended in tooltip\n  buildTempoLines(series, off, unit){\n    unit=unit||'';\n    const h=React.createElement;\n    const W=960,H=300,padL=44,padR=16,padT=16,padB=40;\n    const plotW=W-padL-padR, plotH=H-padT-padB;\n    const bk=series.buckets, colors=series.colors, names=series.names, ns=names.length;\n    const n=bk.length;\n    const xAt=i=> n<=1? padL+plotW/2 : padL+(i/(n-1))*plotW;\n    let maxV=0; bk.forEach(b=>b.vals.forEach((v,ci)=>{ if(!off[ci]&&v!=null&&v>maxV) maxV=v; }));\n    if(maxV<1) maxV=1;\n    const rawStep=maxV/4, mag=Math.pow(10,Math.floor(Math.log10(rawStep))||0);\n    const step=Math.max(1,Math.ceil(rawStep/mag)*mag), niceMax=step*4;\n    const yAt=v=> padT+plotH*(1-v/niceMax);\n    const els=[];\n    for(let i=0;i<=4;i++){ const val=step*i, y=yAt(val);\n      els.push(h('line',{key:'g'+i,x1:padL,y1:y,x2:W-padR,y2:y,stroke:'#eef0f4',strokeWidth:1}));\n      els.push(h('text',{key:'gl'+i,x:padL-7,y:y+4,textAnchor:'end',fontSize:10,fill:'#b3b9c6',fontFamily:'Source Sans 3,sans-serif'}, val.toLocaleString('pt-BR')));\n    }\n    const xstep=Math.max(1,Math.ceil(n/10));\n    bk.forEach((b,i)=>{ if(i%xstep===0||i===n-1){ els.push(h('text',{key:'x'+i,x:xAt(i),y:H-padB+18,textAnchor:'middle',fontSize:10,fill:'#b3b9c6',fontFamily:'Source Sans 3,sans-serif'}, b.label)); } });\n    for(let ci=0;ci<ns;ci++){ if(off[ci]) continue;\n      let seg=[];\n      const flush=()=>{ if(seg.length>1){ els.push(h('polyline',{key:'l'+ci+'_'+seg[0].i,points:seg.map(pt=>pt.x+','+pt.y).join(' '),fill:'none',stroke:colors[ci],strokeWidth:2,strokeLinejoin:'round',strokeLinecap:'round'})); } else if(seg.length===1){ els.push(h('circle',{key:'d'+ci+'_'+seg[0].i,cx:seg[0].x,cy:seg[0].y,r:2,fill:colors[ci]})); } seg=[]; };\n      bk.forEach((b,i)=>{ const v=b.vals[ci]; if(v==null){ flush(); } else { seg.push({i,x:xAt(i),y:yAt(v)}); } });\n      flush();\n    }\n    const hi=this.state.tempoHoverIdx;\n    if(hi!=null && hi>=0 && hi<n){\n      els.push(h('line',{key:'hl',x1:xAt(hi),y1:padT,x2:xAt(hi),y2:padT+plotH,stroke:'#c2cadb',strokeWidth:1,strokeDasharray:'3 3'}));\n      for(let ci=0;ci<ns;ci++){ if(off[ci]||bk[hi].vals[ci]==null) continue; els.push(h('circle',{key:'hc'+ci,cx:xAt(hi),cy:yAt(bk[hi].vals[ci]),r:3,fill:'#fff',stroke:colors[ci],strokeWidth:2})); }\n    }\n    bk.forEach((b,i)=>{ const bw=n<=1?plotW:plotW/(n-1); els.push(h('rect',{key:'hr'+i,x:xAt(i)-bw/2,y:padT,width:bw,height:plotH,fill:'transparent',onMouseEnter:()=>this.setState({tempoHoverIdx:i})})); });\n    const svg=h('svg',{viewBox:'0 0 '+W+' '+H,preserveAspectRatio:'xMidYMid meet',style:{width:'100%',height:'auto',display:'block'}}, els);\n    let tip=null;\n    if(hi!=null && hi>=0 && hi<n){\n      const pct=xAt(hi)/W*100, tx=pct<18?'0':(pct>82?'-100%':'-50%');\n      const rows=[];\n      for(let ci=0;ci<ns;ci++){ if(off[ci]||bk[hi].vals[ci]==null) continue; rows.push(h('div',{key:'tr'+ci,style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#444b60',marginTop:2}},\n        h('span',{style:{width:8,height:8,borderRadius:'50%',background:colors[ci],display:'inline-block',flex:'none'}}),\n        h('span',{style:{flex:1,whiteSpace:'nowrap'}},names[ci]),\n        h('strong',{style:{color:'#1a1f36'}},bk[hi].vals[ci].toLocaleString('pt-BR')+unit))); }\n      tip=h('div',{style:{position:'absolute',left:pct+'%',top:'4px',transform:'translateX('+tx+')',background:'#fff',border:'1px solid #e2e7f0',borderRadius:8,boxShadow:'0 6px 20px rgba(13,31,90,.12)',padding:'9px 12px',pointerEvents:'none',minWidth:160,maxWidth:260,zIndex:5}},\n        h('div',{style:{fontFamily:'Libre Franklin,sans-serif',fontWeight:700,fontSize:12.5,color:'#1a1f36',marginBottom:3}},bk[hi].label),\n        rows);\n    }\n    return h('div',{style:{position:'relative',width:'100%'},onMouseLeave:()=>this.setState({tempoHoverIdx:null})}, svg, tip);\n  }\n\n  renderVals(){\n    const p=this.state.page;\n    const base=\"font-size:14px;padding:8px 16px;border-radius:6px;cursor:pointer;border:none;font-family:inherit;\";\n    const active=base+\"font-weight:600;color:#fff;background:rgba(255,255,255,.16);\";\n    const idle=base+\"font-weight:500;color:#c9d3f0;background:transparent;\";\n    const nav={\n      isInicio:p==='inicio', isRelatorios:p==='relatorios', isLeis:p==='leis',\n      goInicio:()=>this.setState({page:'inicio'}), goRelatorios:()=>this.setState({page:'relatorios'}), goLeis:()=>this.setState({page:'leis'}),\n      navInicioStyle:p==='inicio'?active:idle, navRelStyle:p==='relatorios'?active:idle, navLeisStyle:p==='leis'?active:idle,\n    };\n\n    if(this.state.loading || this.state.error || !this.state.data){\n      return Object.assign(nav,{ dashLoading:this.state.loading, dashError:this.state.error, dashReady:false, geradoEm:'' });\n    }\n\n    const data=this.state.data, meta=data.meta;\n    const [A,B]=this.bounds();\n    const s=this.sumRange(A,B);\n    const idxElogio=meta.categorias.indexOf('Elogio');\n    const fmt=n=>n.toLocaleString('pt-BR');\n    const kpis={\n      kFeitos:fmt(s.f),\n      kConcluidos:fmt(s.c),\n      kAbertos:fmt(s.fab),\n      kTaxa: s.f>0 ? (s.fcc/s.f*100).toFixed(1).replace('.',',')+'%' : '—',\n      kTempo: s.cn>0 ? fmt(Math.round(s.cd/s.cn)) : '—',\n      kElogios: fmt(s.cat[idxElogio]||0),\n    };\n\n    // granularity options\n    const gBase=\"font-size:13px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid #d6deec;\";\n    const gOn=gBase+\"background:#1a3a8f;color:#fff;border-color:#1a3a8f;\";\n    const gOff=gBase+\"background:#fff;color:#1a3a8f;\";\n    const granDefs=[['dia','Dia'],['semana','Semana'],['mes','Mês'],['ano','Ano'],['custom','Intervalo']];\n    const granOpts=granDefs.map(([k,label])=>({label, style:this.state.gran===k?gOn:gOff, click:()=>this.setGran(k)}));\n\n    const offMap=this.state.offMap;\n    const lBase=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid #e2e7f0;background:#fff;\";\n    const dimWords={sec:'secretaria',bai:'bairro',ass:'assunto'};\n\n    // ===== PAINEL 1 — Secretaria / Bairro / Assunto (barras laterais por entidade) =====\n    const hasMensal=this.state.data.mensal_dim && Object.keys(this.state.data.mensal_dim).length>0;\n    let chartTitle='', chartSubtitle='', dimTabs=[], dimBars=[];\n    if(hasMensal){\n      let dim=this.state.chartDim; if(dim==='cat') dim='sec';\n      const dimAvail=[['sec','Secretaria'],['bai','Bairro'],['ass','Assunto']];\n      const dtBase=\"font-size:13px;font-weight:600;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid #d6deec;\";\n      const dtOn=dtBase+\"background:#1a3a8f;color:#fff;border-color:#1a3a8f;\";\n      const dtOff=dtBase+\"background:#fff;color:#1a3a8f;\";\n      dimTabs=dimAvail.map(([k,label])=>({label, style:dim===k?dtOn:dtOff, click:()=>this.setState({chartDim:k,hoverIdx:null})}));\n      chartTitle='Evolução por '+dimWords[dim];\n      chartSubtitle='Protocolos por '+dimWords[dim]+' — acumulado de toda a série mensal · 20 maiores por volume de registros';\n      // aggregate reg/ab/cc per entity over all months\n      const agg=this.aggregateDim(dim); // {names, reg[], ab[], cc[]}\n      const maxReg=Math.max(1,...agg.reg);\n      let rows=agg.names.map((nome,i)=>({nome, reg:agg.reg[i], ab:agg.ab[i], cc:agg.cc[i]}));\n      rows.sort((a,b)=>b.reg-a.reg);\n      rows=rows.slice(0,20);\n      dimBars=rows.map(r=>({\n        nome:r.nome,\n        regVal:fmt(r.reg), abVal:fmt(r.ab), ccVal:fmt(r.cc),\n        regPct:(r.reg/maxReg*100).toFixed(1)+'%',\n        abPct:(r.ab/maxReg*100).toFixed(1)+'%',\n        ccPct:(r.cc/maxReg*100).toFixed(1)+'%',\n        taxa:r.reg>0?(r.cc/r.reg*100).toFixed(0)+'%':'—',\n      }));\n    }\n\n    // ===== GRÁFICO DE LINHAS (top 10 da dimensão · métrica selecionável) =====\n    let tempoChartEl=null, tempoLegend=[], tempoMetricTabs=[], tempoTitle='', tempoRangeLabel='';\n    if(hasMensal){\n      let tdim=this.state.chartDim; if(tdim==='cat') tdim='sec';\n      const lm=this.state.lineMetric||'dias';\n      const lmDefs=[['dias','Tempo médio de resolução'],['reg','Registrados'],['ab','Em aberto'],['cc','Concluídos']];\n      const lmBase=\"font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid #d6deec;\";\n      const lmOn=lmBase+\"background:#1a3a8f;color:#fff;border-color:#1a3a8f;\";\n      const lmOff=lmBase+\"background:#fff;color:#1a3a8f;\";\n      tempoMetricTabs=lmDefs.map(([k,label])=>({label, style:lm===k?lmOn:lmOff, click:()=>this.setState({lineMetric:k,tempoHoverIdx:null})}));\n      const lmTitle={dias:'Tempo médio de resolução',reg:'Protocolos registrados',ab:'Protocolos em aberto',cc:'Protocolos concluídos'};\n      const lmUnit={dias:' dias',reg:'',ab:'',cc:''};\n      const lmRange={\n        dias:'Dias até a conclusão · série histórica mensal · '+(s.cn>0?'média geral '+fmt(Math.round(s.cd/s.cn))+' dias · ':'')+'10 maiores por volume',\n        reg:'Protocolos abertos por mês · série histórica mensal · 10 maiores por volume',\n        ab:'Protocolos ainda em aberto por mês · série histórica mensal · 10 maiores por volume',\n        cc:'Protocolos concluídos por mês · série histórica mensal · 10 maiores por volume',\n      };\n      tempoTitle=lmTitle[lm];\n      tempoRangeLabel=lmRange[lm];\n      const tSeries=this.tempoSeriesFor(tdim, lm);\n      // seleção de entidades: começa com apenas a maior ativa; usuário vai adicionando (mín. 1)\n      const pick = (this.state.tempoPick[tdim] && this.state.tempoPick[tdim].length) ? this.state.tempoPick[tdim] : [0];\n      const tOff=tSeries.names.map((_,i)=>!pick.includes(i));\n      tempoLegend=tSeries.names.map((name,i)=>({\n        name, style:lBase+(tOff[i]?'opacity:.42;':'color:#1a1f36;'),\n        dot:'width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;background:'+tSeries.colors[i]+';'+(tOff[i]?'opacity:.5;':''),\n        click:()=>{\n          const cur=(this.state.tempoPick[tdim] && this.state.tempoPick[tdim].length) ? this.state.tempoPick[tdim].slice() : [0];\n          const at=cur.indexOf(i);\n          let next;\n          if(at>=0){ if(cur.length<=1) return; next=cur.filter(x=>x!==i); }\n          else { next=cur.concat(i); }\n          const m=Object.assign({},this.state.tempoPick); m[tdim]=next; this.setState({tempoPick:m});\n        }\n      }));\n      tempoChartEl=this.buildTempoLines(tSeries, tOff, lmUnit[lm]);\n    }\n\n    // bottlenecks\n    const tBase=\"font-size:13px;font-weight:600;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid #d6deec;\";\n    const tOn=tBase+\"background:#1a3a8f;color:#fff;border-color:#1a3a8f;\";\n    const tOff=tBase+\"background:#fff;color:#1a3a8f;\";\n    const tabDefs=[['secretaria','Secretaria','por_secretaria'],['bairro','Bairro','por_bairro'],['assunto','Assunto','por_assunto']];\n    const botTabs=tabDefs.map(([k,label])=>({label, style:this.state.botTab===k?tOn:tOff, click:()=>this.setState({botTab:k})}));\n    const curDef=tabDefs.find(t=>t[0]===this.state.botTab);\n    const rawList=data.abertos_mais_30d[curDef[2]]||[];\n    const botMax=rawList.reduce((m,x)=>Math.max(m,x.qtd),1);\n    const botList=rawList.map(x=>({nome:x.nome, qtd:fmt(x.qtd), dias_medio:fmt(x.dias_medio), barPct:(x.qtd/botMax*100).toFixed(1)+'%'}));\n    const refD=this.parse(data.abertos_mais_30d.referencia);\n    const botRef=String(refD.getUTCDate()).padStart(2,'0')+'/'+String(refD.getUTCMonth()+1).padStart(2,'0')+'/'+refD.getUTCFullYear();\n    const gerD=this.parse(meta.gerado_em);\n    const geradoEm='dados atualizados em '+String(gerD.getUTCDate()).padStart(2,'0')+'/'+String(gerD.getUTCMonth()+1).padStart(2,'0')+'/'+gerD.getUTCFullYear();\n\n    return Object.assign(nav,{\n      dashLoading:false, dashError:false, dashReady:true, geradoEm,\n      granOpts, periodLabel:this.periodLabel(),\n      prevPeriod:()=>this.shift(-1), nextPeriod:()=>this.shift(1),\n      showCustom:this.state.gran==='custom',\n      customStart:this.state.customStart, customEnd:this.state.customEnd,\n      setCustomStart:e=>this.setState({customStart:e.target.value,hoverIdx:null}),\n      setCustomEnd:e=>this.setState({customEnd:e.target.value,hoverIdx:null}),\n      hasDimChart:hasMensal, dimTabs, dimBars, chartTitle, chartSubtitle,\n      tempoChartEl, tempoLegend, tempoMetricTabs, tempoTitle, tempoRangeLabel,\n      botTabs, botList, botRef, botTotal:fmt(data.abertos_mais_30d.total),\n      ...kpis,\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
